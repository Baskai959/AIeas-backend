# 应用运行角色配置。普通配置只从本文件读取；.env 只放密钥/凭证。
app:
  # 进程角色：all=REST/MCP/WS 单体；api=仅 REST/MCP/业务 worker；ws-gateway=仅 /ws 与运维端点。
  role: "all"

# Hertz 服务监听与生命周期配置。
server:
  # 监听地址；API 网关池可用 :8888，WebSocket 网关池可用 :8889。
  addr: ":8888"
  # 读取 HTTP 请求的超时时间。
  readTimeout: 5s
  # 写出 HTTP 响应的超时时间。
  writeTimeout: 45s
  # HTTP 请求体大小上限；图片批量上传允许 20MB，这里预留 multipart 开销。
  maxRequestBodySizeBytes: 26214400
  # 进程收到退出信号后的优雅关闭等待时间。
  shutdownTimeout: 20s
  # CORS 跨域配置；使用 Bearer Token，不开启 cookie credentials，因此允许全部来源。
  cors:
    # 是否启用 CORS。
    enabled: true
    # 允许的浏览器 Origin；"*" 表示全部来源。
    allowOrigins:
      - "*"
    # 允许的跨域方法。
    allowMethods:
      - "GET"
      - "POST"
      - "PUT"
      - "PATCH"
      - "DELETE"
      - "OPTIONS"
    # 允许前端携带的请求头。
    allowHeaders:
      - "Authorization"
      - "Content-Type"
      - "Idempotency-Key"
      - "X-Request-Id"
      - "X-Trace-Id"
      - "X-Metrics-Token"
    # 允许前端读取的响应头。
    exposeHeaders:
      - "X-Request-Id"
    # 使用 "*" 时必须保持 false，否则浏览器不接受。
    allowCredentials: false
    # 预检缓存时间，单位秒。
    maxAgeSeconds: 600

# MySQL 连接池配置。
mysql:
  # GORM/MySQL DSN；生产环境在这里改主机、库名与账号。
  dsn: "root:Zjy1029.@tcp(127.0.0.1:3306)/aieas?charset=utf8mb4&parseTime=true&loc=Local"
  # 最大打开连接数。
  maxOpenConns: 100
  # 最大空闲连接数。
  maxIdleConns: 20
  # 单条连接最长复用时间。
  connMaxLifetime: 1h

# Redis 配置：RT 走实时强一致路径，Cache 走可重建缓存/幂等路径。
redis:
  # 实时 Redis 分片配置，承载拍卖状态、出价 Lua、Stream、锁、在线计数等。
  rt:
    # 分片列表；同一 auction/session 会按哈希固定路由到同一 shard。
    shards:
      # RT 分片 0。
      # 地址；密码可用 REDIS_RT_SHARD_0_PASSWORD 放在 .env。
      - addr: "127.0.0.1:6381"
        # Redis 用户名。
        username: "default"
        # Redis 密码；建议留空并在 .env 写 REDIS_RT_SHARD_0_PASSWORD。
        password: ""
        # Redis DB 编号。
        db: 0
        # Redis 连接池大小。
        poolSize: 100
      # RT 分片 1。
      # 地址；密码可用 REDIS_RT_SHARD_1_PASSWORD 放在 .env。
      - addr: "127.0.0.1:6382"
        # Redis 用户名。
        username: "default"
        # Redis 密码；建议留空并在 .env 写 REDIS_RT_SHARD_1_PASSWORD。
        password: ""
        # Redis DB 编号。
        db: 0
        # Redis 连接池大小。
        poolSize: 100
  # 缓存 Redis 实例，承载 L2 缓存、幂等记录等可丢失/可重建数据。
  cache:
    # Redis 地址；密码可用 REDIS_CACHE_PASSWORD 放在 .env。
    addr: "127.0.0.1:6380"
    # Redis 用户名。
    username: "default"
    # Redis 密码；建议留空并在 .env 写 REDIS_CACHE_PASSWORD。
    password: ""
    # Redis DB 编号。
    db: 0
    # Redis 连接池大小。
    poolSize: 100

# HTTP 幂等记录配置。
idempotency:
  # 幂等结果保留时间。
  ttl: 24h

# JWT 配置。
jwt:
  # JWT issuer。
  issuer: "realtime-auction-master"
  # JWT 签名密钥；建议留占位值并在 .env 写 JWT_SECRET。
  secret: "change-me-in-local-dev"
  # access token 有效期。
  accessTokenTTL: 12h

# 雪花 ID 配置。
idgen:
  # workerID 范围 0-255；多实例必须不同。
  workerID: 1

# 拍卖业务规则配置。
auction:
  # 默认最小加价金额，单位：分。
  minIncrementCent: 100
  # 防狙击触发窗口，单位：毫秒。
  antiSnipeMs: 30000
  # 每次防狙击延长时长，单位：毫秒。
  extendMs: 30000
  # 单个拍品最多延长次数。
  maxExtendCount: 20
  # 单用户出价频控次数。
  freqLimitCount: 10
  # 单用户出价频控窗口，单位：毫秒。
  freqWindowMs: 1000
  # 出价请求幂等 key 的短期保留时间。
  bidIdempotencyTTL: 30s
  # 异步模式下，落锤前等待 in-flight 命令排空的最长时间（毫秒）；超时后强制 finalize。
  hammerDrainMaxWaitMs: 5000
  # 异步模式下，落锤屏障轮询周期（毫秒）；不要忙等。
  hammerDrainPollMs: 50
  # timer 触发落锤的短宽限期（毫秒）：到点后再等待该值才进入 hammer 分支，
  # 给异步出价命令最后一刻的延长留窗口。防狙击窗口本身由延长后的 endTime 表达。
  hammerAntiSnipingGraceMs: 500

# 风控总开关配置。
riskControl:
  # false 会关闭 HTTP 限流、出价频控、黑名单拦截和自动拉黑。
  enabled: false

# WebSocket 网关配置。
websocket:
  # 单条 WS 文本帧最大读取字节数。
  readLimitBytes: 65536
  # 每个客户端 outbound channel 缓冲大小。
  sendBufferSize: 256
  # 服务端 ping 间隔；上游网关 proxy_read_timeout/proxy_send_timeout 必须大于该值。
  pingInterval: 20s
  # 未收到 pong 时允许连接存活的最长时间。
  pongTimeout: 60s
  # 单次 WS 写操作超时时间。
  writeTimeout: 5s
  # 单 IP 每分钟 WS 握手上限；0 表示关闭该维度限流。
  handshakeRateLimitPerIP: 0
  # 单用户每分钟 WS 握手上限；0 表示关闭该维度限流。
  handshakeRateLimitPerUser: 0
  # 单拍品每分钟 WS 握手上限；0 表示关闭该维度限流。
  handshakeRateLimitPerAuction: 0
  # ws-gateway 排空时等待旧连接退出的最长时间。
  drainTimeout: 30s
  # 写 close frame 的宽限时间，必须小于等于 drainTimeout。
  closeGrace: 1s
  # 初始 ping 抖动窗口，避免大量连接同一时刻集中 ping。
  pingJitter: 5s
  # Redis Stream replay 的最大补帧数量。
  replayLimit: 256

# 对象存储配置。
objectStorage:
  # 是否启用对象存储；false 时使用 DisabledUploader。
  enabled: true
  # TOS endpoint。
  endpoint: "https://tos-cn-beijing.volces.com"
  # TOS region。
  region: "cn-beijing"
  # TOS bucket 名。
  bucket: "aieas"
  # 对外访问 bucket 的基础 URL。
  bucketURL: "https://aieas.tos-cn-beijing.volces.com"
  # TOS access key；建议留空并在 .env 写 OBJECT_STORAGE_ACCESS_KEY。
  accessKey: ""
  # TOS secret key；建议留空并在 .env 写 OBJECT_STORAGE_SECRET_KEY。
  secretKey: ""
  # 上传对象名前缀，可为空。
  objectPrefix: ""

# 外部 Agent 服务配置。
agent:
  # 商品描述生成接口地址。
  productDescriptionURL: "http://127.0.0.1:8000/api/v1/product-description"
  # 商品描述优化接口超时时间。
  productDescriptionTimeout: 2m
  # 是否启用商品 AI 审核；false 时提交审核默认直接通过。
  productAuditEnabled: true
  # 商品 AI 审核接口地址。
  productAuditURL: "http://127.0.0.1:8000/api/v1/product-audit"
  # 商品审核结果回调地址。
  productAuditCallbackURL: "http://127.0.0.1:8888/api/v1/auctions/audit/callback"
  # 直播分析异步接口地址。
  liveAnalysisURL: "http://127.0.0.1:8000/api/v1/live-analysis/async"
  # 直播分析回调地址。
  liveAnalysisCallbackURL: "http://127.0.0.1:8888/api/v1/live-analysis/callback"
  # 直播分析回调鉴权 key；建议留占位值并在 .env 写 AGENT_LIVE_ANALYSIS_CALLBACK_API_KEY。
  liveAnalysisCallbackAPIKey: "change-me-in-local-dev-live-analysis-callback"
  # 直播拍卖助手 hook 地址。
  liveAuctionHookURL: "http://127.0.0.1:8000/api/v1/live-assistant"
  # 其他 Agent HTTP 请求超时时间。
  timeout: 45s

# 豆包 TTS 配置。
doubaoTTS:
  # 豆包 TTS app id；建议留空并在 .env 写 DOUBAO_TTS_APP_ID。
  appID: ""
  # 豆包 TTS access token；建议留空并在 .env 写 DOUBAO_TTS_ACK_TOKEN。
  ackToken: ""
  # TTS 音色 ID。
  voice: "zh_female_vv_jupiter_bigtts"

# Kafka 事件总线配置。
kafka:
  # 是否启用 Kafka worker/producer/consumer。
  enabled: true
  # Kafka broker 地址列表。
  brokers:
    - "127.0.0.1:9092"
  # Kafka client id。
  clientID: "aieas-backend"
  # 出价事件 topic。
  bidEventsTopic: "aieas.bid.events"
  # 异步竞价命令 topic（独立于结果落库流 bid.events）。
  bidCommandsTopic: "aieas.bid.commands"
  # 异步竞价命令 topic 的默认分区数；启动期会 ensure topic 存在并使用该分区数。
  # bid command 使用 bid/request 维度 key 配合 Hash balancer 分散到不同 partition；
  # 同 auction 不再由 Kafka partition FIFO 保序，裁决正确性由 Redis EvalOnShard + bid.lua + idem key 保证。0/负值会兜底回 16。
  bidCommandsPartitions: 16
  # 拍卖事件 topic。
  auctionEventsTopic: "aieas.auction.events"
  # 订单事件 topic。
  orderEventsTopic: "aieas.order.events"
  # 出价事件桥接 consumer group。
  bidBridgeGroup: "aieas-bid-kafka-bridge"
  # 出价记录落库 consumer group。
  bidRecordGroup: "aieas-bid-record-writers"
  # 异步竞价裁决 consumer group。
  bidDecisionGroup: "aieas-bid-decision-workers"
  # 路线 X：BidDecisionWorker 主消费循环并发裁决 goroutine 上限。同 auction
  # 串行性由 Redis 同 shard 单线程兜底，不再依赖 partition FIFO。允许 [16,256]，
  # 0/负值/非法值会归一化回退默认 128。
  bidDecisionWorkerPoolSize: 128
  # commit 模式：single（单条 commit，与历史行为一致）或 batch（批量 commit，
  # 默认）。配合 Lua idem_key 30s TTL 提供 at-least-once 兜底。
  bidDecisionCommitMode: "batch"
  # batch commit 攒批最大条数（>=1）。
  bidDecisionCommitBatchSize: 64
  # batch commit 攒批最大等待时长（毫秒）。
  bidDecisionCommitMaxLatencyMs: 200
  # 异步竞价协调器（BidAsyncCoordinator）每个 auction in-flight 待裁决命令上限；
  # 撞顶后入队请求会回 HOT_AUCTION_QUEUE_FULL。允许 [100,10000]，0/负值会归一化回 2000。
  bidAsyncMaxPendingPerAuction: 2000

# MCP 读写接口鉴权配置。
mcp:
  # 只读 MCP 身份。
  read:
    # 只读 MCP API key；建议留占位值并在 .env 写 MCP_READ_API_KEY。
    apiKey: "change-me-in-local-dev-mcp-read"
    # 只读 MCP 默认 actor id。
    actorID: "u_9001"
    # 只读 MCP 默认 actor role。
    actorRole: "admin"
  # 控制 MCP 身份。
  control:
    # 控制 MCP API key；建议留占位值并在 .env 写 MCP_CONTROL_API_KEY。
    apiKey: "change-me-in-local-dev-mcp-control"
    # 控制 MCP 默认 actor id。
    actorID: "u_9001"
    # 控制 MCP 默认 actor role。
    actorRole: "admin"

# 日志、指标、链路追踪、健康检查配置。
observability:
  # 日志级别，常用值：debug/info/warn/error/dev。
  logLevel: "info"
  # 兼容历史字段；新配置优先使用 metrics.path。
  metricsPath: "/metrics"
  # 日志格式：text=开发友好文本，json=生产一行一条 JSON。
  format: "text"
  # GORM 慢 SQL 阈值，单位：毫秒；<=0 关闭慢 SQL 检测。
  slowSQLThresholdMs: 200

  # Prometheus /metrics 配置。
  metrics:
    # 是否启用 metrics 采集与导出。
    enabled: true
    # metrics endpoint path；为空时回退到 observability.metricsPath。
    path: "/metrics"
    # Prometheus metric namespace。
    namespace: "aieas"
    # metrics 访问令牌；建议留空并在 .env 写 OBSERVABILITY_METRICS_AUTH_TOKEN。
    authToken: ""

  # OpenTelemetry trace 配置。
  tracing:
    # 是否启用 tracing。
    enabled: false
    # exporter 类型：otlphttp | otlpgrpc | stdout | noop。
    exporter: "otlphttp"
    # exporter endpoint；启用 otlphttp/otlpgrpc 时必填。
    endpoint: ""
    # 是否使用非 TLS 连接 collector。
    insecure: true
    # trace service.name。
    serviceName: "aieas-backend"
    # 采样器：always_on | always_off | traceidratio | parent_based_always_on | parent_based_traceid_ratio。
    sampler: "parent_based_traceid_ratio"
    # traceidratio 类采样器的采样率，范围 0-1。
    sampleRatio: 1.0

  # 健康检查路径配置。
  health:
    # 存活检查路径。
    livenessPath: "/healthz"
    # 就绪检查路径。
    readinessPath: "/readyz"
