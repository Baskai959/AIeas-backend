server:
  addr: ":8888"
  readTimeout: 5s
  writeTimeout: 10s
  shutdownTimeout: 20s

mysql:
  dsn: "auction:auction@tcp(127.0.0.1:3306)/auction?charset=utf8mb4&parseTime=true&loc=Local"
  maxOpenConns: 100
  maxIdleConns: 20
  connMaxLifetime: 1h

redis:
  # RT 实例：实时路径（拍卖状态/出价/Stream/锁/在线计数等强一致+低延迟操作）。
  # 多 shard 时由应用层按聚合根（auctionID/sessionID/roomID）的 fnv32 哈希
  # 路由到单个 shard，保证同一聚合根的所有 key 落同 shard，满足 Lua EVAL 与
  # multi-key 命令的同 slot 约束。全局 key（如 ws:instances）固定到 shard 0。
  rt:
    shards:
      - addr: "127.0.0.1:6381"
        username: "default"
        password: ""
        db: 0
        poolSize: 100
      - addr: "127.0.0.1:6382"
        username: "default"
        password: ""
        db: 0
        poolSize: 100
  # Cache 实例：查询缓存层（L2 + 幂等记录等可丢失/可重建数据）。
  cache:
    addr: "127.0.0.1:6380"
    username: "default"
    password: ""
    db: 0
    poolSize: 100

idempotency:
  ttl: 24h

jwt:
  issuer: "realtime-auction-master"
  secret: "change-me-in-local-dev"
  accessTokenTTL: 12h

idgen:
  workerID: 1

auction:
  minIncrementCent: 100
  antiSnipeMs: 30000
  extendMs: 30000
  maxExtendCount: 20
  freqLimitCount: 10
  freqWindowMs: 1000
  bidIdempotencyTTL: 30s

riskControl:
  enabled: false

websocket:
  readLimitBytes: 65536
  sendBufferSize: 256
  pingInterval: 20s
  pongTimeout: 60s

objectStorage:
  enabled: false
  endpoint: "https://tos-cn-beijing.volces.com"
  region: "cn-beijing"
  bucket: "aieas"
  bucketURL: "https://aieas.tos-cn-beijing.volces.com"
  accessKey: ""
  secretKey: ""
  objectPrefix: ""

agent:
  productDescriptionURL: "http://127.0.0.1:8000/api/v1/product-description"
  # true: 提交拍品后调用 AI 审核；false: 不调用 AI，提交审核时默认直接通过。
  productAuditEnabled: true
  productAuditURL: "http://127.0.0.1:8000/api/v1/product-audit"
  productAuditCallbackURL: "http://127.0.0.1:8888/api/v1/auctions/audit/callback"
  liveAnalysisURL: "http://127.0.0.1:8000/api/v1/live-analysis/async"
  liveAnalysisCallbackURL: "http://127.0.0.1:8888/api/v1/live-analysis/callback"
  liveAnalysisCallbackAPIKey: "change-me-in-local-dev-live-analysis-callback"
  liveAuctionHookURL: "http://127.0.0.1:8000/api/v1/live-assistant"
  timeout: 30s

doubaoTTS:
  appID: ""
  ackToken: ""
  voice: "zh_female_vv_jupiter_bigtts"

kafka:
  enabled: true
  brokers:
    - "127.0.0.1:9092"
  clientID: "aieas-backend"
  bidEventsTopic: "aieas.bid.events"
  auctionEventsTopic: "aieas.auction.events"
  orderEventsTopic: "aieas.order.events"
  bidBridgeGroup: "aieas-bid-kafka-bridge"
  bidRecordGroup: "aieas-bid-record-writers"

mcp:
  read:
    apiKey: "change-me-in-local-dev-mcp-read"
    actorID: "u_9001"
    actorRole: "admin"
  control:
    apiKey: "change-me-in-local-dev-mcp-control"
    actorID: "u_9001"
    actorRole: "admin"

observability:
  logLevel: "dev"
  # 兼容历史字段；新部署请使用 metrics.path
  metricsPath: "/metrics"
  # format: text → 控制台彩色对齐文本 (dev)；json → 一行一条 JSON (prod)
  format: "text"
  # GORM 慢 SQL 阈值（毫秒），<=0 关闭慢 SQL 检测
  slowSQLThresholdMs: 200

  # Prometheus /metrics 端点。
  # path 为空时回退到上面的 metricsPath。
  # authToken 非空时要求请求带 Authorization: Bearer <token> 或 X-Metrics-Token: <token>。
  metrics:
    enabled: true
    path: "/metrics"
    namespace: "aieas"
    authToken: ""

  # OpenTelemetry trace 链路（默认禁用）。
  # exporter: otlphttp | otlpgrpc | stdout | noop
  # sampler:  always_on | always_off | traceidratio | parent_based_always_on | parent_based_traceid_ratio
  tracing:
    enabled: false
    exporter: "otlphttp"
    endpoint: ""
    insecure: true
    serviceName: "aieas-backend"
    sampler: "parent_based_traceid_ratio"
    sampleRatio: 1.0

  # 健康检查端点路径。
  health:
    livenessPath: "/healthz"
    readinessPath: "/readyz"
