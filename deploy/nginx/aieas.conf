map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Basic edge protection. Application-level auth/idempotency/business rate limiting still
# lives in aieas_backend; these zones only protect gateway/backends from floods.
limit_req_zone $binary_remote_addr zone=aieas_api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=aieas_write:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=aieas_ws_handshake:10m rate=10r/s;

upstream aieas_api {
    # API Backend pool: run every instance with APP_ROLE=api.
    # Replace these addresses with Pod IPs, service DNS names, or VM addresses.
    least_conn;
    server 10.0.10.11:8888 max_fails=3 fail_timeout=10s;
    server 10.0.10.12:8888 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

upstream aieas_ws_gateway {
    # WebSocket Gateway pool: run every instance with APP_ROLE=ws-gateway.
    # Do NOT enable sticky sessions here (no ip_hash, sticky cookie, or equivalent):
    # reconnect correctness relies on lastSeq/replay/snapshot, and draining must rebalance.
    least_conn;
    server 10.0.20.11:8889 max_fails=3 fail_timeout=10s;
    server 10.0.20.12:8889 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

server {
    listen 443 ssl http2;
    server_name api.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    client_max_body_size 20m;

    # TLS terminates at nginx; upstream aieas backends speak plaintext HTTP.
    # Nginx OSS does not actively health-check upstreams. Configure Kubernetes readiness
    # probes (preferred) or an external LB to remove API Backend and WS Gateway instances
    # from their pools based on each process' /readyz.

    location /api/ {
        limit_req zone=aieas_api burst=100 nodelay;
        proxy_pass http://aieas_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Tighter protection for login/bid/order/live-session writes. Keep application-side
    # idempotency and HandshakeLimiter/RiskControl as the final authority.
    location ~ ^/api/v1/(auth/login|auctions/[^/]+/(enroll|start|cancel|hammer)|orders/[^/]+/pay|live-sessions/[^/]+/(start|end|activate|deactivate|lots))$ {
        limit_req zone=aieas_write burst=20 nodelay;
        proxy_pass http://aieas_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mcp/ {
        limit_req zone=aieas_api burst=60 nodelay;
        proxy_pass http://aieas_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /metrics {
        # Default strategy: expose /metrics from APP_ROLE=api only. For stricter setups,
        # remove this public route and let Prometheus scrape pod-internal endpoints.
        proxy_pass http://aieas_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /healthz {
        # Gateway liveness. Backend readiness is checked through /readyz.
        access_log off;
        return 200 "ok\n";
    }

    location = /readyz {
        # Public readiness represents the API backend pool. WS gateway readiness should be
        # checked by the LB/Kubernetes against ws-gateway pods directly.
        proxy_pass http://aieas_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /ws-readyz {
        # Optional diagnostics endpoint for operators; do not use it for client traffic.
        proxy_pass http://aieas_ws_gateway/readyz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        limit_req zone=aieas_ws_handshake burst=50 nodelay;
        proxy_pass http://aieas_ws_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep idle timeout greater than websocket.pingInterval; required >= 90s here.
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }
}
