services:
  prometheus:
    image: prom/prometheus:v3.1.0
    restart: unless-stopped
    env_file:
      - ./prod.env
    entrypoint:
      - /bin/sh
      - -ec
      - |
        : "$${OBSERVABILITY_METRICS_AUTH_TOKEN:?OBSERVABILITY_METRICS_AUTH_TOKEN is required in ./prod.env}"
        cat > /tmp/prometheus.yml <<EOF
        global:
          scrape_interval: 15s
          evaluation_interval: 15s

        scrape_configs:
          - job_name: aieas-backend
            metrics_path: /metrics
            authorization:
              type: Bearer
              credentials: "$${OBSERVABILITY_METRICS_AUTH_TOKEN}"
            static_configs:
              - targets:
                  - host.docker.internal:8888
        EOF
        exec /bin/prometheus \
          --config.file=/tmp/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=15d \
          --web.enable-lifecycle
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - prometheus-data:/prometheus
    networks:
      - aieas-monitoring

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "0.0.0.0:3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    configs:
      - source: grafana_datasource
        target: /etc/grafana/provisioning/datasources/prometheus.yml
    depends_on:
      - prometheus
    networks:
      - aieas-monitoring

networks:
  aieas-monitoring:
    name: aieas-monitoring

volumes:
  prometheus-data:
  grafana-data:

configs:
  grafana_datasource:
    content: |
      apiVersion: 1

      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus:9090
          isDefault: true
          editable: true
