  /api/v1/ai/start-price-suggest:
    post:
      tags: [AI]
      summary: 根据商品信息建议起拍价
      operationId: suggestStartPrice
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [itemId, marketPrice, category, strategy]
              properties:
                itemId:
                  type: string
                marketPrice:
                  type: integer
                  format: int64
                category:
                  type: string
                strategy:
                  type: string
                  example: TRAFFIC_FIRST
      responses:
        "200":
          description: 起拍价建议
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          suggestedStartPrice:
                            type: integer
                            format: int64
                          suggestedMinIncrement:
                            type: integer
                            format: int64
                          reason:
                            type: string
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/v1/ai/announcement:
    post:
      tags: [AI]
      summary: 生成直播间公告文案
      operationId: generateAnnouncement
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [auctionId, tone, sellingPoints]
              properties:
                auctionId:
                  type: string
                tone:
                  type: string
                  example: EXCITED
                sellingPoints:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: 公告文案
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          announcement:
                            type: string
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /ws/auctions/{auction_id}:
    get:
      tags: [WebSocket]
      summary: WebSocket 竞拍连接
      description: |
        连接地址示例：wss://api.example.com/ws/auctions/1001?token=<jwt>&lastSeq=102
        lastSeq 用于断线重连补偿；服务端会补发 seq > lastSeq 的近期事件，窗口过期时发送 room.snapshot_required 提示客户端拉取状态快照。

        客户端事件：bid.place、room.subscribe、room.unsubscribe、heartbeat。
        服务端事件：bid.ack、bid.accepted、bid.rejected、ranking.updated、bidder.overtaken、timer.tick、timer.extended、auction.started、auction.closed、order.created、announcement、risk.event、room.online、room.snapshot_required、error。
      operationId: websocketConnect
      parameters:
        - name: auction_id
          in: path
          required: true
          schema:
            type: integer
            format: uint64
        - name: lastSeq
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 0
          description: 断线重连时客户端已收到的最后服务端事件 seq。
      responses:
        "101":
          description: Switching Protocols
        "401":
          description: Token 无效或缺失

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: 写操作建议携带，关键写操作必传
    RequiredIdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
      description: 关键写操作必传

  responses:
    SuccessObject:
      description: 成功
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiResponse"
    ParamInvalid:
      description: 参数不合法
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 20001
            message: 参数不合法
            data: {}
            trace_id: trc_error
    AuthTokenInvalid:
      description: 访问令牌无效或缺失
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missing:
              value:
                code: 10001
                message: 缺少访问令牌
                data: {}
                trace_id: trc_error
            invalid:
              value:
                code: 10002
                message: 访问令牌无效或已过期
                data: {}
                trace_id: trc_error
    AuthLoginFailed:
      description: 登录失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 10004
            message: 登录失败
            data: {}
            trace_id: trc_error
    AuthAccountDisabled:
      description: 账号已停用
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 10005
            message: 账号已停用
            data: {}
            trace_id: trc_error
    AuthForbidden:
      description: 无访问权限
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 10003
            message: 无访问权限
            data: {}
            trace_id: trc_error
    IdempotencyConflict:
      description: 幂等键冲突
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 90004
            message: 幂等键冲突
            data: {}
            trace_id: trc_error
    ServiceUnavailable:
      description: 服务暂不可用
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 90002
            message: 服务暂不可用
            data: {}
            trace_id: trc_error
    ItemNotFound:
      description: 商品不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 30001
            message: 商品不存在
            data: {}
            trace_id: trc_error
    ItemStatusInvalid:
      description: 商品状态不允许操作
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 30003
            message: 商品状态不允许操作
            data: {}
            trace_id: trc_error
    AuctionNotFound:
      description: 拍品不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 40001
            message: 拍品不存在
            data: {}
            trace_id: trc_error
    AuctionStatusInvalid:
      description: 拍品状态不允许操作
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 40002
            message: 拍品状态不允许操作
            data: {}
            trace_id: trc_error
    OrderNotFound:
      description: 订单不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 60001
            message: 订单不存在
            data: {}
            trace_id: trc_error
    OrderStatusInvalid:
      description: 订单状态不允许操作
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 60002
            message: 订单状态不允许操作
            data: {}
            trace_id: trc_error
    OrderPaymentFailed:
      description: 支付失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 60003
            message: 支付失败
            data: {}
            trace_id: trc_error
    RiskEventNotFound:
      description: 风控事件不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 80003
            message: 风控事件不存在
            data: {}
            trace_id: trc_error

  schemas:
    ApiResponse:
      type: object
      required: [code, message, data, trace_id]
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
        trace_id:
          type: string
          example: trc_202605230001
    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
      example:
        code: 50001
        message: 出价需不低于当前价加最低加价幅度
        data:
          currentPrice: 12000
          minNextPrice: 13000
        trace_id: trc_202605230002
    Role:
      type: string
      enum: [buyer, merchant, admin]
    UserStatus:
      type: string
      enum: [ACTIVE, DISABLED]
    User:
      type: object
      properties:
        id:
          type: string
          example: u_1001
        nickname:
          type: string
          example: 竞拍用户001
        role:
          $ref: "#/components/schemas/Role"
        status:
          $ref: "#/components/schemas/UserStatus"
    LoginRequest:
      type: object
      required: [account, password, role]
      properties:
        account:
          type: string
          example: buyer001
        password:
          type: string
          format: password
          example: Passw0rd!
        role:
          $ref: "#/components/schemas/Role"
    LoginResult:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          format: int64
          example: 43200
        user:
          $ref: "#/components/schemas/User"
    RefreshTokenResult:
      type: object
      properties:
        accessToken:
          type: string
        expiresIn:
          type: integer
          format: int64
          example: 43200
    LoginResponseEnvelope:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/LoginResult"

    ItemCreateRequest:
      type: object
      required: [title, category]
      properties:
        title:
          type: string
        category:
          type: string
        brand:
          type: string
        conditionGrade:
          type: string
          enum: [NEW, LIKE_NEW, GOOD, FAIR]
        status:
          type: string
          enum: [DRAFT, PENDING_AUDIT, READY, REJECTED, LISTED, OFFLINE]
        description:
          type: string
        images:
          type: array
          description: 重复提交 images 文件字段，单张图片不超过 2MB，后端上传到私有对象存储后在响应中返回图片代理 URL 数组
          items:
            type: string
            format: binary
    ItemUpdateRequest:
      type: object
      properties:
        title:
          type: string
        category:
          type: string
        brand:
          type: string
        conditionGrade:
          type: string
          enum: [NEW, LIKE_NEW, GOOD, FAIR]
        status:
          type: string
          enum: [DRAFT, PENDING_AUDIT, READY, REJECTED, LISTED, OFFLINE]
        description:
          type: string
        images:
          type: array
          description: 提交 images 文件字段时替换原图片代理 URL 数组；不提交则保持原图片不变；单张图片不超过 2MB
          items:
            type: string
            format: binary
    ItemDTO:
      type: object
      properties:
        id:
          type: string
        merchantId:
          type: string
        title:
          type: string
        description:
          type: string
        images:
          type: array
          description: 后端图片代理 URL 数组，浏览器通过后端读取私有对象存储图片
          items:
            type: string
        category:
          type: string
        marketPrice:
          type: integer
          format: int64
        status:
          type: string
        createdAt:
          type: string
          format: date-time
    ItemResponseEnvelope:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ItemDTO"
    ItemPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ItemDTO"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
    DeleteResponseEnvelope:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              type: object
              properties:
                deleted:
                  type: boolean

    AuctionRuleSnapshot:
      type: object
      required: [startPrice, minIncrement, antiSnipeSec, extendSec]
      properties:
        startPrice:
          type: integer
          format: int64
          description: 起拍价，单位分，允许为 0
        minIncrement:
          type: integer
          format: int64
          description: 最低加价幅度，单位分
        antiSnipeSec:
          type: integer
        extendSec:
          type: integer
        depositAmount:
          type: integer
          format: int64
    AuctionCreateRequest:
      type: object
      required: [itemId, title, startPrice, minIncrement, depositAmount, scheduledStartTime, durationSec]
      properties:
        itemId:
          type: string
        title:
          type: string
        startPrice:
          type: integer
          format: int64
          minimum: 0
        minIncrement:
          type: integer
          format: int64
        depositAmount:
          type: integer
          format: int64
        scheduledStartTime:
          type: string
          format: date-time
        durationSec:
          type: integer
