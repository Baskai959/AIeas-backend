openapi: 3.0.3
info:
  title: 实时竞拍大师 API
  version: v1
  description: |
    3 周 MVP 直播竞拍系统 REST API 与 WebSocket 连接说明。
    REST 路径保持 /api/v1 前缀，金额单位为分，时间字段使用 ISO 8601 或毫秒时间戳。
servers:
  - url: http://localhost:8888
    description: Local
  - url: https://api.example.com
    description: Demo
tags:
  - name: Health
    description: 健康检查
  - name: Auth
    description: 登录、刷新、登出、当前用户
  - name: Item
    description: 商家商品管理
  - name: Auction
    description: 拍品管理、报名、状态查询
  - name: Order
    description: 订单查询与支付
  - name: Admin
    description: 平台管理后台
  - name: AI
    description: AI 辅助能力
  - name: WebSocket
    description: 实时竞拍 WebSocket 连接

paths:
  /ping:
    get:
      tags: [Health]
      summary: 健康检查
      operationId: ping
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: pong

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: 用户或商家登录
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              account: buyer001
              password: Passw0rd!
              role: buyer
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponseEnvelope"
              example:
                code: 0
                message: success
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.demo
                  refreshToken: rft_9c8b7a
                  expiresIn: 43200
                  user:
                    id: u_1001
                    nickname: 竞拍用户001
                    role: buyer
                trace_id: trc_auth_login
        "400":
          $ref: "#/components/responses/ParamInvalid"
        "401":
          $ref: "#/components/responses/AuthLoginFailed"
        "403":
          $ref: "#/components/responses/AuthAccountDisabled"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 退出登录
      operationId: authLogout
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  example: rft_9c8b7a
      responses:
        "200":
          description: 退出成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          loggedOut:
                            type: boolean
              example:
                code: 0
                message: success
                data:
                  loggedOut: true
                trace_id: trc_auth_logout
        "401":
          $ref: "#/components/responses/AuthTokenInvalid"

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: 刷新访问令牌
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  example: rft_9c8b7a
      responses:
        "200":
          description: 刷新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RefreshTokenResult"
              example:
                code: 0
                message: success
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.new
                  expiresIn: 43200
                trace_id: trc_auth_refresh
        "401":
          $ref: "#/components/responses/AuthTokenInvalid"
        "403":
          $ref: "#/components/responses/AuthAccountDisabled"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: 获取当前登录用户信息
      operationId: authMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 当前用户
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/User"
              example:
                code: 0
                message: success
                data:
                  id: u_1001
                  nickname: 竞拍用户001
                  role: buyer
                  status: ACTIVE
                trace_id: trc_auth_me
        "401":
          $ref: "#/components/responses/AuthTokenInvalid"

  /api/v1/items:
    post:
      tags: [Item]
      summary: 商家创建商品
      operationId: createItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ItemCreateRequest"
            example:
              title: 孤品手作陶瓷杯
              description: 直播间限量拍卖款
              category: home
              brand: DemoBrand
              conditionGrade: NEW
              status: DRAFT
      responses:
        "200":
          description: 商品创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponseEnvelope"
              example:
                code: 0
                message: success
                data:
                  id: item_1001
                  title: 孤品手作陶瓷杯
                  marketPrice: 12900
                  status: ACTIVE
                trace_id: trc_item_create
        "400":
          $ref: "#/components/responses/ParamInvalid"
        "403":
          $ref: "#/components/responses/AuthForbidden"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
    get:
      tags: [Item]
      summary: 商家查询自己的商品列表
      operationId: listItems
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: keyword
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 商品列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ItemPage"
              example:
                code: 0
                message: success
                data:
                  items:
                    - id: item_1001
                      title: 孤品手作陶瓷杯
                      marketPrice: 12900
                      status: ACTIVE
                  total: 1
                  page: 1
                  page_size: 20
                trace_id: trc_item_list
        "401":
          $ref: "#/components/responses/AuthTokenInvalid"

  /api/v1/items/{id}:
    get:
      tags: [Item]
      summary: 查询商品详情
      operationId: getItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: 商品详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponseEnvelope"
        "403":
          $ref: "#/components/responses/AuthForbidden"
        "404":
          $ref: "#/components/responses/ItemNotFound"
    patch:
      tags: [Item]
      summary: 更新商品信息
      operationId: updateItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ItemUpdateRequest"
            example:
              title: 孤品手作陶瓷杯升级款
              description: 直播间限量拍卖升级款
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponseEnvelope"
        "403":
          $ref: "#/components/responses/AuthForbidden"
        "404":
          $ref: "#/components/responses/ItemNotFound"
        "409":
          $ref: "#/components/responses/ItemStatusInvalid"
    delete:
      tags: [Item]
      summary: 删除商品
      operationId: deleteItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponseEnvelope"
        "403":
          $ref: "#/components/responses/AuthForbidden"
        "404":
          $ref: "#/components/responses/ItemNotFound"
        "409":
          $ref: "#/components/responses/ItemStatusInvalid"

  /api/v1/auctions:
    post:
      tags: [Auction]
      summary: 商家创建拍品
      operationId: createAuction
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuctionCreateRequest"
      responses:
        "200":
          description: 拍品创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionResponseEnvelope"
        "400":
          $ref: "#/components/responses/ParamInvalid"
        "403":
          $ref: "#/components/responses/AuthForbidden"
        "404":
          $ref: "#/components/responses/ItemNotFound"
    get:
      tags: [Auction]
      summary: 查询拍品列表
      operationId: listAuctions
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            type: string
        - name: keyword
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 拍品列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuctionPage"
        "400":
          $ref: "#/components/responses/ParamInvalid"

  /api/v1/auctions/mine:
    get:
      tags: [Auction]
      summary: 查询当前用户相关拍品
      operationId: listMyAuctions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: roleView
          in: query
          schema:
            type: string
            enum: [buyer, merchant]
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 当前用户相关拍品
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuctionPage"
        "401":
          $ref: "#/components/responses/AuthTokenInvalid"

  /api/v1/auctions/{id}:
    get:
      tags: [Auction]
      summary: 查询拍品详情
      operationId: getAuction
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: 拍品详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionResponseEnvelope"
        "404":
          $ref: "#/components/responses/AuctionNotFound"
    patch:
      tags: [Auction]
      summary: 更新拍品配置
      operationId: updateAuction
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuctionUpdateRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionResponseEnvelope"
        "403":
          $ref: "#/components/responses/AuthForbidden"
        "404":
          $ref: "#/components/responses/AuctionNotFound"
        "409":
          $ref: "#/components/responses/AuctionStatusInvalid"

  /api/v1/auctions/{id}/start:
    post:
      tags: [Auction]
      summary: 商家开始拍卖
      operationId: startAuction
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                operatorRemark:
                  type: string
      responses:
        "200":
          description: 开拍成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionResponseEnvelope"
        "403":
          $ref: "#/components/responses/AuthForbidden"
        "404":
          $ref: "#/components/responses/AuctionNotFound"
        "409":
          $ref: "#/components/responses/AuctionStatusInvalid"

  /api/v1/auctions/{id}/hammer:
    post:
      tags: [Auction]
      summary: 商家落锤成交
      operationId: hammerAuction
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/RequiredIdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                hammerRemark:
                  type: string
      responses:
        "200":
          description: 落锤成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/HammerResult"
        "404":
          $ref: "#/components/responses/AuctionNotFound"
        "409":
          $ref: "#/components/responses/AuctionStatusInvalid"

  /api/v1/auctions/{id}/cancel:
    post:
      tags: [Auction]
      summary: 商家取消拍卖
      operationId: cancelAuction
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: 取消成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuctionResponseEnvelope"
        "403":
          $ref: "#/components/responses/AuthForbidden"
        "404":
          $ref: "#/components/responses/AuctionNotFound"
        "409":
          $ref: "#/components/responses/AuctionStatusInvalid"

  /api/v1/auctions/{id}/state:
    get:
      tags: [Auction]
      summary: 获取拍品实时状态快照
      operationId: getAuctionState
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: 实时状态
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuctionState"
        "404":
          $ref: "#/components/responses/AuctionNotFound"

  /api/v1/auctions/{id}/enroll:
    post:
      tags: [Auction]
      summary: 用户报名拍卖并冻结保证金
      operationId: enrollAuction
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/RequiredIdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [depositPayChannel]
              properties:
                depositPayChannel:
                  type: string
                  example: MOCK_PAY
      responses:
        "200":
          description: 报名成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/EnrollResult"
        "403":
          $ref: "#/components/responses/AuthForbidden"

  /api/v1/orders:
    get:
      tags: [Order]
      summary: 商家查询订单列表
      operationId: listOrders
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            type: string
        - name: auctionId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 订单列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/OrderPage"
        "403":
          $ref: "#/components/responses/AuthForbidden"

  /api/v1/orders/mine:
    get:
      tags: [Order]
      summary: 买家查询自己的订单
      operationId: listMyOrders
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 我的订单
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/OrderPage"
        "401":
          $ref: "#/components/responses/AuthTokenInvalid"

  /api/v1/orders/{id}:
    get:
      tags: [Order]
      summary: 查询订单详情
      operationId: getOrder
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: 订单详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponseEnvelope"
        "403":
          $ref: "#/components/responses/AuthForbidden"
        "404":
          $ref: "#/components/responses/OrderNotFound"

  /api/v1/orders/{id}/pay:
    post:
      tags: [Order]
      summary: 买家支付订单
      operationId: payOrder
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/RequiredIdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payChannel]
              properties:
                payChannel:
                  type: string
                  example: MOCK_PAY
      responses:
        "200":
          description: 支付成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponseEnvelope"
        "404":
          $ref: "#/components/responses/OrderNotFound"
        "409":
          $ref: "#/components/responses/OrderStatusInvalid"
        "502":
          $ref: "#/components/responses/OrderPaymentFailed"

  /api/v1/admin/auth/login:
    post:
      tags: [Admin, Auth]
      summary: 管理员登录
      operationId: adminLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account, password]
              properties:
                account:
                  type: string
                  example: admin001
                password:
                  type: string
                  format: password
                  example: AdminPassw0rd!
      responses:
        "200":
          description: 管理员登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponseEnvelope"
        "401":
          $ref: "#/components/responses/AuthLoginFailed"
        "403":
          $ref: "#/components/responses/AuthAccountDisabled"

  /api/v1/admin/auctions:
    get:
      tags: [Admin]
      summary: 后台查询全量拍品
      operationId: adminListAuctions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            type: string
        - name: merchantId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 拍品列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuctionPage"
        "403":
          $ref: "#/components/responses/AuthForbidden"

  /api/v1/admin/auctions/{id}/audit:
    post:
      tags: [Admin]
      summary: 审核拍品
      operationId: adminAuditAuction
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [auditResult]
              properties:
                auditResult:
                  type: string
                  enum: [APPROVED, REJECTED]
                reason:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/SuccessObject"
        "404":
          $ref: "#/components/responses/AuctionNotFound"
        "409":
          $ref: "#/components/responses/AuctionStatusInvalid"

  /api/v1/admin/auctions/{id}/cancel:
    post:
      tags: [Admin]
      summary: 平台强制取消拍品
      operationId: adminCancelAuction
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/SuccessObject"
        "404":
          $ref: "#/components/responses/AuctionNotFound"

  /api/v1/admin/auctions/{id}/close:
    post:
      tags: [Admin]
      summary: 平台强制关闭拍品
      operationId: adminCloseAuction
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/SuccessObject"
        "404":
          $ref: "#/components/responses/AuctionNotFound"

  /api/v1/admin/users:
    get:
      tags: [Admin]
      summary: 查询平台用户
      operationId: adminListUsers
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: role
          in: query
          schema:
