services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - ./docker/prod.env
    ports:
      - "0.0.0.0:3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql-init/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./docs/ddl.sql:/docker-init/ddl.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u\"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis-rt-1:
    image: redis:7.4-alpine
    restart: unless-stopped
    env_file:
      - ./docker/prod.env
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_RT_SHARD_0_PASSWORD" ]; then
          exec redis-server --appendonly yes --appendfsync everysec --save 60 1000 --maxmemory-policy noeviction --requirepass "$$REDIS_RT_SHARD_0_PASSWORD"
        fi
        exec redis-server --appendonly yes --appendfsync everysec --save 60 1000 --maxmemory-policy noeviction
    volumes:
      - redis-rt-1-data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_RT_SHARD_0_PASSWORD}\" ]; then REDISCLI_AUTH=\"$${REDIS_RT_SHARD_0_PASSWORD}\" redis-cli ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis-rt-2:
    image: redis:7.4-alpine
    restart: unless-stopped
    env_file:
      - ./docker/prod.env
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_RT_SHARD_1_PASSWORD" ]; then
          exec redis-server --appendonly yes --appendfsync everysec --save 60 1000 --maxmemory-policy noeviction --requirepass "$$REDIS_RT_SHARD_1_PASSWORD"
        fi
        exec redis-server --appendonly yes --appendfsync everysec --save 60 1000 --maxmemory-policy noeviction
    volumes:
      - redis-rt-2-data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_RT_SHARD_1_PASSWORD}\" ]; then REDISCLI_AUTH=\"$${REDIS_RT_SHARD_1_PASSWORD}\" redis-cli ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis-cache:
    image: redis:7.4-alpine
    restart: unless-stopped
    env_file:
      - ./docker/prod.env
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_CACHE_PASSWORD" ]; then
          exec redis-server --appendonly yes --appendfsync everysec --save 60 1000 --maxmemory-policy allkeys-lfu --requirepass "$$REDIS_CACHE_PASSWORD"
        fi
        exec redis-server --appendonly yes --appendfsync everysec --save 60 1000 --maxmemory-policy allkeys-lfu
    volumes:
      - redis-cache-data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_CACHE_PASSWORD}\" ]; then REDISCLI_AUTH=\"$${REDIS_CACHE_PASSWORD}\" redis-cli ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka:
    image: apache/kafka:3.7.2
    restart: unless-stopped
    user: "0:0"
    environment:
      CLUSTER_ID: "LelM2dIFQkiUFvXCEcqRWA"
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "INTERNAL://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: "aieas"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
    ports:
      - "127.0.0.1:8082:8080"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: aieas-backend:latest
    restart: unless-stopped
    env_file:
      - ./docker/prod.env
    depends_on:
      mysql:
        condition: service_healthy
      redis-rt-1:
        condition: service_healthy
      redis-rt-2:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "0.0.0.0:8888:8888"

  prometheus:
    image: prom/prometheus:v3.1.0
    restart: unless-stopped
    env_file:
      - ./docker/prod.env
    depends_on:
      app:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -ec
      - |
        : "$${OBSERVABILITY_METRICS_AUTH_TOKEN:?OBSERVABILITY_METRICS_AUTH_TOKEN is required in ./docker/prod.env}"
        cat > /tmp/prometheus.yml <<EOF
        global:
          scrape_interval: 15s
          evaluation_interval: 15s

        scrape_configs:
          - job_name: aieas-backend
            metrics_path: /metrics
            authorization:
              type: Bearer
              credentials: "$${OBSERVABILITY_METRICS_AUTH_TOKEN}"
            static_configs:
              - targets:
                  - app:8888
        EOF
        exec /bin/prometheus \
          --config.file=/tmp/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=15d \
          --web.enable-lifecycle
    volumes:
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      prometheus:
        condition: service_started
    configs:
      - source: grafana_datasource
        target: /etc/grafana/provisioning/datasources/prometheus.yml
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "0.0.0.0:3000:3000"

volumes:
  mysql-data:
  redis-rt-1-data:
  redis-rt-2-data:
  redis-cache-data:
  kafka-data:
  prometheus-data:
  grafana-data:

configs:
  grafana_datasource:
    content: |
      apiVersion: 1

      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus:9090
          isDefault: true
          editable: true
